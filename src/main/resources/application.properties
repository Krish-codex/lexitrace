# ===================================================================
# LexiTrace Application Configuration
# ===================================================================

# Application
spring.application.name=LexiTrace

# ===================================================================
# Database Configuration (MySQL - Production)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/lexitrace?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=7582728371@Sk
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# Database Configuration (H2 - Development)
# ===================================================================
# spring.datasource.url=jdbc:h2:file:./data/lexitrace;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
# spring.datasource.username=sa
# spring.datasource.password=
# spring.datasource.driver-class-name=org.h2.Driver
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ===================================================================
# Schema & Data Initialization
# ===================================================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# ===================================================================
# Thymeleaf
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===================================================================
# Server
# ===================================================================
server.port=8080
server.error.whitelabel.enabled=false
server.error.path=/error

# ===================================================================
# File Upload
# ===================================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================================================================
# Logging
# ===================================================================
logging.level.root=INFO
logging.level.com.lexitrace=DEBUG
logging.level.org.springframework.security=INFO
