<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Lessons — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: user-sidebar}"></div>
    <div class="main-content">
        <div class="page-header">
            <h1><span th:text="${language?.flagEmoji}">🏳</span> <span th:text="${language?.name}">Language</span> — Lessons</h1>
            <p>Complete lessons in order to unlock the next one</p>
        </div>

        <div th:each="lesson : ${lessons}">
            <div class="lesson-item"
                 th:classappend="${completedMap[lesson.id]} ? 'completed' : (${!unlockedMap[lesson.id]} ? 'locked' : '')">
                <div class="lesson-order" th:text="${lesson.orderIndex}">1</div>
                <div class="lesson-info">
                    <div class="lesson-title" th:text="${lesson.title}">Lesson Title</div>
                    <div class="lesson-desc" th:text="${lesson.description}">Description</div>
                    <div class="lesson-meta">
                        <span class="badge badge-info" th:text="${lesson.difficulty}">Beginner</span>
                        <span th:if="${completedMap[lesson.id]}">✅ Completed</span>
                        <span th:if="${!unlockedMap[lesson.id]}">🔒 Locked</span>
                    </div>
                </div>
                <a th:if="${unlockedMap[lesson.id] && !completedMap[lesson.id]}"
                   th:href="@{/user/lesson/{id}/content(id=${lesson.id})}"
                   class="btn btn-primary btn-sm">Start →</a>
                <a th:if="${completedMap[lesson.id]}"
                   th:href="@{/user/lesson/{id}/content(id=${lesson.id})}"
                   class="btn btn-outline btn-sm">Redo</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(lessons)}" class="card text-center" style="padding:40px;">
            <p class="text-muted">No lessons available for this language yet.</p>
        </div>

        <a th:href="@{/user/languages}" class="btn btn-outline mt-16">← Back to Languages</a>
    </div>
</div>
</body>
</html>
