<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Profile — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: user-sidebar}"></div>
    <div class="main-content">
        <div class="page-header"><h1>👤 My Profile</h1></div>

        <div class="alert alert-success" th:if="${param.updated}">Profile updated!</div>
        <div class="alert alert-success" th:if="${param.passwordChanged}">Password changed!</div>
        <div class="alert alert-danger" th:if="${param.error == 'wrongpassword'}">Current password is incorrect</div>

        <div class="grid-2">
            <!-- Profile Info -->
            <div class="card">
                <h3 style="margin-bottom:20px;">Edit Profile</h3>
                <form th:action="@{/user/profile/update}" method="post">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="name" class="form-control" th:value="${user.name}" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" th:value="${user.email}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>

            <!-- Change Password -->
            <div class="card">
                <h3 style="margin-bottom:20px;">Change Password</h3>
                <form th:action="@{/user/profile/change-password}" method="post">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" name="currentPassword" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" name="newPassword" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-warning">Change Password</button>
                </form>
            </div>
        </div>

        <!-- Stats -->
        <div class="card-grid mt-16">
            <div class="stat-card purple"><div class="stat-icon">⭐</div><div class="stat-value" th:text="${totalXP}">0</div><div class="stat-label">Total XP</div></div>
            <div class="stat-card green"><div class="stat-icon">🔥</div><div class="stat-value" th:text="${streak}">0</div><div class="stat-label">Streak</div></div>
            <div class="stat-card orange"><div class="stat-icon">🎖</div><div class="stat-value" th:text="${badges.size()}">0</div><div class="stat-label">Badges</div></div>
        </div>

        <!-- Enrolled Languages -->
        <div class="card mt-16">
            <h3 style="margin-bottom:16px;">🌍 Enrolled Languages</h3>
            <div th:each="lang : ${enrolledLanguages}" class="leaderboard-item">
                <div class="rank" th:text="${lang.flagEmoji}">🏳</div>
                <div class="lb-name" th:text="${lang.name}">Language</div>
            </div>
            <div th:if="${#lists.isEmpty(enrolledLanguages)}" class="text-center text-muted" style="padding:20px;">No languages enrolled</div>
        </div>

        <!-- Badges -->
        <div class="card mt-16" th:if="${!#lists.isEmpty(badges)}">
            <h3 style="margin-bottom:16px;">🎖 Badges</h3>
            <div class="badge-grid">
                <div th:each="b : ${badges}" class="badge-item">
                    <div class="badge-icon" th:text="${b['icon']}">🎓</div>
                    <div class="badge-name" th:text="${b['name']}">Badge</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
