<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Notifications — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: user-sidebar}"></div>
    <div class="main-content">
        <div class="page-header flex-between">
            <h1>🔔 Notifications</h1>
            <form th:action="@{/user/notifications/read-all}" method="post">
                <button type="submit" class="btn btn-outline btn-sm">Mark All Read</button>
            </form>
        </div>
        <div class="card">
            <div th:each="n : ${notifications}" class="notification-item" th:classappend="${!n.isRead} ? 'unread' : ''">
                <div class="notif-msg" th:text="${n.message}">Message</div>
                <div class="notif-time" th:text="${#temporals.format(n.createdAt,'MMM dd, HH:mm')}">time</div>
                <form th:if="${!n.isRead}" th:action="@{/user/notifications/read/{id}(id=${n.id})}" method="post">
                    <button type="submit" class="btn btn-outline btn-sm">✓</button>
                </form>
            </div>
            <div th:if="${#lists.isEmpty(notifications)}" class="text-center text-muted" style="padding:40px;">No notifications yet</div>
        </div>
    </div>
</div>
</body>
</html>
