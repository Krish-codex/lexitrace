<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Languages — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: user-sidebar}"></div>
    <div class="main-content">
        <div class="page-header">
            <h1>🌍 Browse Languages</h1>
            <p>Enroll in a language to start learning</p>
        </div>
        <div class="card-grid">
            <div th:each="lang : ${languages}" class="card lang-card">
                <div class="flag" th:text="${lang.flagEmoji}">🏳</div>
                <div class="lang-name" th:text="${lang.name}">Language</div>
                <div class="lang-code" th:text="${lang.code}">xx</div>

                <!-- Progress Ring -->
                <div class="progress-ring" style="margin-top:16px;">
                    <svg width="80" height="80">
                        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#6c63ff"/><stop offset="100%" style="stop-color:#e91e8c"/></linearGradient></defs>
                        <circle class="bg" cx="40" cy="40" r="34"/>
                        <circle class="fg" cx="40" cy="40" r="34"
                                th:attr="stroke-dasharray=${2 * 3.14159 * 34}, stroke-dashoffset=${2 * 3.14159 * 34 * (1 - (progressMap[lang.id] ?: 0) / 100)}"/>
                    </svg>
                    <div class="pct"><span th:text="${#numbers.formatDecimal(progressMap[lang.id] ?: 0, 0, 0)}">0</span>%</div>
                </div>

                <div style="margin-top:16px;">
                    <form th:if="${!enrollmentMap[lang.id]}" th:action="@{/user/languages/enroll/{id}(id=${lang.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-primary btn-sm">Enroll</button>
                    </form>
                    <div th:if="${enrollmentMap[lang.id]}">
                        <a th:href="@{/user/lessons/{id}(id=${lang.id})}" class="btn btn-success btn-sm">Continue</a>
                        <form th:action="@{/user/languages/unenroll/{id}(id=${lang.id})}" method="post" style="display:inline;margin-left:8px;">
                            <button type="submit" class="btn btn-outline btn-sm">Unenroll</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
