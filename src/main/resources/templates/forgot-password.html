<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>🌐 LexiTrace</h1>
            <p>Reset your password</p>
        </div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/reset-password}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Security Answer</label>
                <input type="text" name="securityAnswer" class="form-control" placeholder="Your security answer" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword" class="form-control" placeholder="New password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Reset Password</button>
        </form>
        <div style="text-align:center;margin-top:20px;">
            <a th:href="@{/login}">Back to login</a>
        </div>
    </div>
</div>
</body>
</html>
