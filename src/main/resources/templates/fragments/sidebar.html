<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<!-- User Sidebar Fragment -->
<div th:fragment="user-sidebar" class="sidebar">
    <div class="logo">LexiTrace<span>Language Learning</span></div>
    <nav>
        <a th:href="@{/user/dashboard}" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''"><span class="icon">🏠</span> Dashboard</a>
        <a th:href="@{/user/languages}" th:classappend="${currentPage == 'languages'} ? 'active' : ''"><span class="icon">🌍</span> Languages</a>
        <a th:href="@{/user/analytics}" th:classappend="${currentPage == 'analytics'} ? 'active' : ''"><span class="icon">📊</span> Analytics</a>
        <a th:href="@{/user/profile}" th:classappend="${currentPage == 'profile'} ? 'active' : ''"><span class="icon">👤</span> Profile</a>
        <a th:href="@{/user/notifications}" th:classappend="${currentPage == 'notifications'} ? 'active' : ''">
            <span class="icon">🔔</span> Notifications
            <span th:if="${unreadCount != null && unreadCount > 0}" class="badge badge-danger" th:text="${unreadCount}" style="margin-left:auto;"></span>
        </a>
    </nav>
    <div class="user-info">
        <div class="name" th:text="${user?.name}">User</div>
        <div class="email" th:text="${user?.email}">user@email.com</div>
        <form th:action="@{/logout}" method="post" style="margin-top:12px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">Logout</button>
        </form>
    </div>
</div>

<!-- Admin Sidebar Fragment -->
<div th:fragment="admin-sidebar" class="sidebar">
    <div class="logo">LexiTrace<span>Admin Panel</span></div>
    <nav>
        <a th:href="@{/admin/dashboard}" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''"><span class="icon">📈</span> Dashboard</a>
        <a th:href="@{/admin/users}" th:classappend="${currentPage == 'users'} ? 'active' : ''"><span class="icon">👥</span> Users</a>
        <a th:href="@{/admin/languages}" th:classappend="${currentPage == 'languages'} ? 'active' : ''"><span class="icon">🌍</span> Languages</a>
        <a th:href="@{/admin/lessons}" th:classappend="${currentPage == 'lessons'} ? 'active' : ''"><span class="icon">📚</span> Lessons</a>
        <a th:href="@{/admin/analytics}" th:classappend="${currentPage == 'analytics'} ? 'active' : ''"><span class="icon">📊</span> Analytics</a>
        <a th:href="@{/admin/audit-logs}" th:classappend="${currentPage == 'audit-logs'} ? 'active' : ''"><span class="icon">📋</span> Audit Logs</a>
    </nav>
    <div class="user-info">
        <div class="name" th:text="${user?.name}">Admin</div>
        <div class="email" th:text="${user?.email}">admin@email.com</div>
        <form th:action="@{/logout}" method="post" style="margin-top:12px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
