<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Analytics — Admin — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>
    <div class="main-content">
        <div class="page-header"><h1>📊 Platform Analytics</h1></div>

        <div class="grid-2">
            <div class="chart-container"><h3>📊 XP Distribution</h3><canvas id="xpDist"></canvas></div>
            <div class="chart-container"><h3>🌍 Language Popularity</h3><canvas id="langPop"></canvas></div>
        </div>

        <div class="chart-container"><h3>📉 Lesson Completion Rates</h3><canvas id="compRates"></canvas></div>

        <div class="grid-2">
            <!-- Top Users -->
            <div class="card">
                <h3 style="margin-bottom:16px;">🏆 Top 10 Users by XP</h3>
                <div th:each="u,i : ${topUsers}" class="leaderboard-item">
                    <div class="rank" th:text="${i.index+1}">1</div>
                    <div class="lb-name" th:text="${u.userName}">User</div>
                    <div class="lb-xp"><span th:text="${u.totalPoints}">0</span> XP</div>
                </div>
            </div>

            <!-- Drop-off -->
            <div class="card">
                <h3 style="margin-bottom:16px;">⚠️ Drop-off Analysis</h3>
                <div th:each="entry : ${dropOff}" class="leaderboard-item">
                    <div class="lb-name" th:text="${entry.key}">Lesson</div>
                    <div class="lb-xp" style="color:var(--danger);"><span th:text="${entry.value}">0</span> dropped</div>
                </div>
                <div th:if="${#maps.isEmpty(dropOff)}" class="text-center text-muted" style="padding:20px;">No drop-off data</div>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">
const xpDist=/*[[${xpDistribution}]]*/{};const langPop=/*[[${languagePopularity}]]*/{};const compRates=/*[[${completionRates}]]*/{};
const tc='#a0a0b8',gc='rgba(255,255,255,0.05)',colors=['#6c63ff','#e91e8c','#00c9a7','#ffd93d','#ff6b6b'];
new Chart(document.getElementById('xpDist'),{type:'bar',data:{labels:Object.keys(xpDist),datasets:[{data:Object.values(xpDist),backgroundColor:colors}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc},grid:{color:gc},beginAtZero:true}}}});
new Chart(document.getElementById('langPop'),{type:'doughnut',data:{labels:Object.keys(langPop),datasets:[{data:Object.values(langPop),backgroundColor:colors}]},options:{responsive:true,plugins:{legend:{labels:{color:tc}}}}});
new Chart(document.getElementById('compRates'),{type:'bar',data:{labels:Object.keys(compRates),datasets:[{data:Object.values(compRates),backgroundColor:'#6c63ff'}]},options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{color:gc},max:100},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}});
</script>
</body>
</html>
