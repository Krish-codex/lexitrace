<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Languages — Admin — LexiTrace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>
    <div class="main-content">
        <div class="page-header"><h1>🌍 Language Management</h1></div>

        <div class="card mb-24">
            <h3 style="margin-bottom:16px;">Add New Language</h3>
            <form th:action="@{/admin/languages/add}" method="post" style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;">
                <div class="form-group" style="margin:0;flex:1;min-width:150px;"><label>Name</label><input type="text" name="name" class="form-control" required></div>
                <div class="form-group" style="margin:0;width:100px;"><label>Code</label><input type="text" name="code" class="form-control" required maxlength="5"></div>
                <div class="form-group" style="margin:0;width:80px;"><label>Emoji</label><input type="text" name="flagEmoji" class="form-control" required maxlength="5"></div>
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>ID</th><th>Flag</th><th>Name</th><th>Code</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="l : ${languages}">
                        <td th:text="${l.id}">1</td>
                        <td th:text="${l.flagEmoji}">🏳</td>
                        <td th:text="${l.name}">Language</td>
                        <td th:text="${l.code}">xx</td>
                        <td>
                            <span th:if="${l.isActive}" class="badge badge-success">Active</span>
                            <span th:unless="${l.isActive}" class="badge badge-danger">Inactive</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/languages/toggle/{id}(id=${l.id})}" method="post" style="display:inline;">
                                <button class="btn btn-outline btn-sm" th:text="${l.isActive} ? 'Deactivate' : 'Activate'">Toggle</button>
                            </form>
                            <form th:action="@{/admin/languages/delete/{id}(id=${l.id})}" method="post" style="display:inline;" onsubmit="return confirm('Delete?');">
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
